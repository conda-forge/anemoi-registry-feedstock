{% set version = "0.3.1" %}
{% set python_min = "3.11" %}

package:
  name: anemoi-registry
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-registry/anemoi_registry-{{ version }}.tar.gz
  sha256: 32e78f15fa57554df0494a59a9c4a283add82537fd2b9454f402926b6e8036f6

build:
  entry_points:
    - anemoi-registry = anemoi.registry.__main__:main_PYTHON_ARGCOMPLETE_OK
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - anemoi-datasets >=0.5.28
    - anemoi-utils >=0.4.39
    - jsonpatch
    - requests

test:
  imports:
    - anemoi
  commands:
    - anemoi-registry --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/anemoi-registry/
  summary: A package to manage a registry or data-driven forecasts.
  doc_url: https://anemoi-registry.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
